<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ContentFlow AI</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f14; color: #e0e0e0; overflow: hidden; }

.container { display: grid; grid-template-columns: 300px 1fr 1fr; height: 100vh; gap: 1px; background: #1a1a22; }

.sidebar { background: #111118; padding: 1.5rem; border-right: 1px solid #2a2a35; overflow-y: auto; }

.sidebar h3 { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.15em; color: #888; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid #2a2a35; }

.content-btn { width: 100%; padding: 0.75rem; margin-bottom: 0.5rem; background: #1a1a22; border: 1px solid #2a2a35; color: #aaa; cursor: pointer; border-radius: 6px; font-size: 0.85rem; transition: all 0.2s; text-align: left; }

.content-btn:hover { background: #222230; border-color: #3a3a45; color: #fff; }

.content-btn.active { background: #2d6a4f; border-color: #40916c; color: #fff; }

.chat-area { display: flex; flex-direction: column; background: #0f0f14; }

.toolbar { padding: 1rem; border-bottom: 1px solid #2a2a35; font-size: 0.8rem; color: #666; }

.messages { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }

.msg { display: flex; gap: 12px; animation: slideUp 0.3s ease; }

@keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.msg.user { flex-direction: row-reverse; }

.avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; flex-shrink: 0; }

.msg.ai .avatar { background: #2d6a4f; }

.msg.user .avatar { background: #44546a; }

.bubble { padding: 0.75rem 1rem; border-radius: 12px; font-size: 0.9rem; line-height: 1.6; max-width: 500px; word-wrap: break-word; }

.msg.ai .bubble { background: #1a1a22; border: 1px solid #2a2a35; }

.msg.user .bubble { background: #2d6a4f; }

.chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }

.chip { padding: 6px 12px; background: #1a1a22; border: 1px solid #3a3a45; border-radius: 20px; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; color: #aaa; }

.chip:hover { border-color: #40916c; color: #40916c; }

.input-area { padding: 1rem; border-top: 1px solid #2a2a35; display: flex; gap: 8px; }

.input-box { flex: 1; background: #1a1a22; border: 1px solid #2a2a35; color: #e0e0e0; padding: 0.75rem; border-radius: 8px; font-family: inherit; font-size: 0.9rem; outline: none; resize: none; min-height: 44px; max-height: 100px; }

.input-box:focus { border-color: #40916c; }

.send-btn { width: 44px; height: 44px; background: #40916c; border: none; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #fff; transition: all 0.2s; font-size: 1.2rem; }

.send-btn:hover { background: #52b788; }

.send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.preview { background: #111118; padding: 1.5rem; border-left: 1px solid #2a2a35; overflow-y: auto; display: flex; flex-direction: column; }

.preview-header-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid #2a2a35; }

.preview-header { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: #666; }

.copy-btn { background: #1a1a22; border: 1px solid #3a3a45; color: #aaa; padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; }
.copy-btn:hover { background: #222230; color: #fff; border-color: #40916c; }

.preview-content { background: #f5f5f0; color: #1a1a1a; padding: 1.5rem; border-radius: 8px; font-size: 0.9rem; line-height: 1.8; white-space: pre-wrap; word-wrap: break-word; flex: 1; }

.typing { display: flex; gap: 4px; align-items: center; padding: 0.5rem; }

.dot { width: 6px; height: 6px; background: #888; border-radius: 50%; animation: bounce 1.2s infinite; }
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #3a3a45; border-radius: 3px; }
</style>
</head>
<body>

<div class="container">
  <div class="sidebar">
    <h3>📝 Content Types</h3>
    <button class="content-btn active" onclick="selectType(this, 'social')">📱 Social Media Caption</button>
    <button class="content-btn" onclick="selectType(this, 'blog')">📰 Blog Post</button>
    <button class="content-btn" onclick="selectType(this, 'product')">🛍 Product Description</button>
    <button class="content-btn" onclick="selectType(this, 'email')">✉️ Email Template</button>
    <button class="content-btn" onclick="selectType(this, 'script')">🎬 Video Script</button>
    <button class="content-btn" onclick="selectType(this, 'landing')">🚀 Landing Page Copy</button>
    <button class="content-btn" onclick="selectType(this, 'tweet')">𝕏 Tweet Thread</button>
  </div>

  <div class="chat-area">
    <div class="toolbar">✨ ContentFlow AI — Agentic Content Generator</div>
    <div class="messages" id="messages">
      <div class="msg ai">
        <div class="avatar">✨</div>
        <div>
          <div class="bubble">
            Hey! I'm ContentFlow AI. I create high-converting content in seconds.<br><br>
            <strong>Social Media Caption</strong> selected. What's your post about?
            <div class="chips" id="chips-container">
              <button class="chip" onclick="send('Instagram post about my new AI product launch')">Product launch</button>
              <button class="chip" onclick="send('LinkedIn post about AI in startups')">Thought leadership</button>
              <button class="chip" onclick="send('TikTok caption for a coding tutorial')">Educational</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="input-area">
      <textarea id="input" class="input-box" placeholder="Describe what you want..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea>
      <button class="send-btn" onclick="sendMsg()">→</button>
    </div>
  </div>

  <div class="preview">
    <div class="preview-header-container">
      <div class="preview-header">📄 Live Preview</div>
      <button class="copy-btn" onclick="copyContent()">📋 Copy</button>
    </div>
    <div class="preview-content" id="preview">Your generated content will appear here...</div>
  </div>
</div>

<script>
const API = "/api/generate";
let history = [];
let currentType = 'social';

const labels = { 
  social: 'Social Media Caption', 
  blog: 'Blog Post', 
  product: 'Product Description', 
  email: 'Email Template', 
  script: 'Video Script', 
  landing: 'Landing Page Copy', 
  tweet: 'Tweet Thread' 
};

const contextPrompts = {
  social: "Focus on eye-catching hooks, relevant emojis, and clear calls-to-action suitable for Instagram, LinkedIn, or Facebook.",
  blog: "Focus on clean structuring, engaging subheadings, an introduction that hooks the reader, and an informative tone.",
  product: "Emphasize benefits over features, identify target pain points, and draft compelling feature listings with persuasive closings.",
  email: "Provide high-open-rate subject lines, a direct but conversational body text, and explicit call-to-actions.",
  script: "Format with timestamps or clear directional visual markers (e.g., [Hook], [Visual:], [Audio:]) optimized for TikTok, Reels, or YouTube shorts.",
  landing: "Focus heavily on direct-response copywriting principles: bold headlines, benefit matrices, social proof placeholders, and high-conversion button copy.",
  tweet: "Write in a cohesive thread style using numbers (1/x) optimized for character counts and high engagement mechanics."
};

function getSystemPrompt() {
  return `You are ContentFlow AI, an expert content copywriter specializing in generating ${labels[currentType]}. 
Specific Rules: ${contextPrompts[currentType]}

Workflow:
1. First, quickly ask short clarifying questions regarding tone, target audience, or specific brand goals if they aren't provided.
2. Once you have enough context or when generating, place the final copy strictly between [CONTENT] and [/CONTENT] tags. Any conversational response or questions to the user must stay outside these tags. Keep chat responses highly concise.`;
}

async function sendMsg() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  addMsg('user', text);
  history.push({ role: 'user', content: text });

  showTyping();
  document.querySelector('.send-btn').disabled = true;

  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        systemPrompt: getSystemPrompt(),
        messages: history
      })
    });

    const data = await res.json();
    hideTyping();
    
    if (data.error) throw new Error(data.error);

    const reply = data.content[0].text;
    history.push({ role: 'assistant', content: reply });

    if (reply.includes('[CONTENT]')) {
      const parts = reply.split('[CONTENT]');
      const remaining = parts[1].split('[/CONTENT]');
      const content = remaining[0].trim();
      const chatFeedback = (parts[0] + (remaining[1] || '')).trim();
      
      if (chatFeedback) {
        addMsg('ai', chatFeedback);
      } else {
        addMsg('ai', "✨ I've generated your content! Review it in the Live Preview panel.");
      }
      document.getElementById('preview').textContent = content;
    } else {
      addMsg('ai', reply);
    }
  } catch (err) {
    hideTyping();
    addMsg('ai', '⚠️ Error running generation. Make sure your local node server is up and API key is configured.');
    console.error(err);
  }

  document.querySelector('.send-btn').disabled = false;
}

function addMsg(role, text) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `<div class="avatar">${role === 'user' ? '👤' : '✨'}</div><div><div class="bubble">${text.replace(/\n/g, '<br>')}</div></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.id = 'typing';
  div.className = 'msg ai';
  div.innerHTML = `<div class="avatar">✨</div><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function hideTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function selectType(btn, type) {
  document.querySelectorAll('.content-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentType = type;
  history = [];
  
  // Update starting messages and placeholder chips contextually
  const msgs = document.getElementById('messages');
  msgs.innerHTML = '';
  document.getElementById('preview').textContent = 'Your generated content will appear here...';
  
  const initialChips = {
    social: `<button class="chip" onclick="send('Instagram post for an AI product launch')">Product launch</button><button class="chip" onclick="send('LinkedIn thought leadership on tech trends')">Thought leadership</button>`,
    blog: `<button class="chip" onclick="send('Outline a blog post about learning clean code')">Clean Code Guide</button>`,
    product: `<button class="chip" onclick="send('E-commerce description for wireless noise-canceling headphones')">Headphones Desc</button>`,
    email: `<button class="chip" onclick="send('Cold sales outreach email to tech founders')">Cold Outreach</button>`,
    script: `<button class="chip" onclick="send('1 minute TikTok script explaining recursion simply')">TikTok Recursion</button>`,
    landing: `<button class="chip" onclick="send('Landing page copy for a SaaS productivity extension')">SaaS Landing Page</button>`,
    tweet: `<button class="chip" onclick="send('A 5-tweet thread sharing insights from a weekend hackathon')">Hackathon Thread</button>`
  };

  const introDiv = document.createElement('div');
  introDiv.className = 'msg ai';
  introDiv.innerHTML = `<div class="avatar">✨</div><div><div class="bubble">Changed type to <strong>${labels[type]}</strong>. What should we draft?<div class="chips">${initialChips[type]}</div></div></div>`;
  msgs.appendChild(introDiv);
}

function send(text) {
  document.getElementById('input').value = text;
  sendMsg();
}

function copyContent() {
  const content = document.getElementById('preview').textContent;
  if(content && content !== 'Your generated content will appear here...') {
    navigator.clipboard.writeText(content);
    const copyBtn = document.querySelector('.copy-btn');
    copyBtn.textContent = '✅ Copied!';
    setTimeout(() => { copyBtn.textContent = '📋 Copy'; }, 2000);
  }
}
</script>

</body>
</html>
